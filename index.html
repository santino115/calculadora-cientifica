<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Científica</title>

<style>
body{
    background:#111;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculadora{
    background:#222;
    padding:20px;
    border-radius:10px;
}

#pantalla{
    width:100%;
    height:50px;
    font-size:24px;
    margin-bottom:10px;
    text-align:right;
}

button{
    width:60px;
    height:60px;
    font-size:18px;
    margin:3px;
}
</style>
</head>

<body>

<div class="calculadora">

<input id="pantalla" readonly>

<br>

<button onclick="agregar('Math.sin(')">sin</button>
<button onclick="agregar('Math.cos(')">cos</button>
<button onclick="agregar('Math.tan(')">tan</button>
<button onclick="agregar('Math.sqrt(')">√</button>

<br>

<button onclick="agregar('**')">^</button>
<button onclick="agregar('Math.PI')">π</button>
<button onclick="agregar('(')">(</button>
<button onclick="agregar(')')">)</button>

<br>

<button onclick="agregar('7')">7</button>
<button onclick="agregar('8')">8</button>
<button onclick="agregar('9')">9</button>
<button onclick="agregar('/')">÷</button>

<br>

<button onclick="agregar('4')">4</button>
<button onclick="agregar('5')">5</button>
<button onclick="agregar('6')">6</button>
<button onclick="agregar('*')">×</button>

<br>

<button onclick="agregar('1')">1</button>
<button onclick="agregar('2')">2</button>
<button onclick="agregar('3')">3</button>
<button onclick="agregar('-')">-</button>

<br>

<button onclick="agregar('0')">0</button>
<button onclick="calcular()">=</button>
<button onclick="borrar()">C</button>
<button onclick="agregar('+')">+</button>

</div>

<script>
let pantalla = document.getElementById("pantalla")

function agregar(valor){
    pantalla.value += valor
}

function borrar(){
    pantalla.value = ""
}

function calcular(){
    try{
        pantalla.value = eval(pantalla.value)
    }
    catch{
        pantalla.value = "Error"
    }
}
</script>

</body>
</html>
